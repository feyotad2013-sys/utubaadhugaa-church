<!DOCTYPE html>
<html lang="om">
<head>
    <meta charset="UTF-8">
    <title>Galarii - Utubaa Dhugaa</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f4; }
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            padding: 40px;
        }
        .gallery-item img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 12px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            transition: 0.3s;
        }
        .gallery-item img:hover { transform: scale(1.03); }
        .back-btn { display: inline-block; margin-top: 20px; padding: 10px 20px; background: #007bff; color: white; text-decoration: none; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>Galarii Suuraa Waldaa</h1>
    <p>Giddu-gala suuraalee tajaajila keenyaa</p>

    <div class="gallery-grid">
        {% for image in images %}
        <div class="gallery-item">
            <img src="{{ url_for('static', filename='gallery/' + image) }}" alt="Church Photo">
        </div>
        {% endfor %}
    </div>

    <a href="/" class="back-btn">Gara Manaatti Deebi'i</a>
</body>
</html>
